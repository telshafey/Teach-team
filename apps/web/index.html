      @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
      body {
        font-family: 'Tajawal', sans-serif;
      }
      .rgl-editing .react-grid-item {
          border: 1px dashed #7dd3fc; /* sky-300 */
          border-radius: 0.5rem;
      }
      .react-resizable-handle {
          background-image: none;
          width: 20px;
          height: 20px;
          position: absolute;
          right: 0;
          bottom: 0;
          padding: 0 3px 3px 0;
          background-repeat: no-repeat;
          background-origin: content-box;
          box-sizing: border-box;
          cursor: se-resize;
      }
      .react-resizable-handle::after {
          content: "";
          display: block;
          width: 10px;
          height: 10px;
          border-right: 2px solid rgba(0,0,0,0.4);
          border-bottom: 2px solid rgba(0,0,0,0.4);
      }
      .dark .react-resizable-handle::after {
          border-right: 2px solid rgba(255,255,255,0.4);
          border-bottom: 2px solid rgba(255,255,255,0.4);
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #print-area, #print-area *,
        #salary-slip-print-area, #salary-slip-print-area * {
          visibility: visible;
        }
        #print-area, #salary-slip-print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          padding: 2rem;
        }
        /* Ensure dashboard UI is hidden */
        aside, header, #report-controls {
            display: none !important;
        }
      }
